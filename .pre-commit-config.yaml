# Pre-commit hooks for walmart-mcp.
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.78.0
    hooks:
      - id: trufflehog
        args: ["--no-update", "filesystem", "--fail", "--no-verification", "."]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: tenant-fingerprint-scrub
        name: scrub tenant fingerprints
        description: |
          Block commits that accidentally include a customer/seller name or
          internal identifier from another deployment. Extend the regex below
          when adopting this repo for your own seller account.
        entry: python scripts/check_tenant_fingerprints.py
        language: system
        pass_filenames: true
        types: [text]
